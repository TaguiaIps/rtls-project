name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv sync --project apps/api --extra dev --active

      - name: Lint backend
        run: |
          source .venv/bin/activate
          uv run --project apps/api --active python -m ruff check apps/api

      - name: Test backend with coverage
        run: |
          source .venv/bin/activate
          uv run --project apps/api --active python -m pytest apps/api/tests

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml
          retention-days: 7

      - name: Build backend package
        run: |
          source .venv/bin/activate
          uv run --project apps/api --active python -m build ./apps/api

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace dependencies
        run: npm install

      - name: Lint JavaScript workspaces
        run: npm run lint

      - name: Test JavaScript workspaces
        run: npm run test

      - name: Test web with coverage
        working-directory: apps/web
        run: npx vitest run --coverage

      - name: Test mobile with coverage
        working-directory: apps/mobile
        run: npx vitest run --coverage

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: apps/mobile/coverage/
          retention-days: 7

      - name: Build JavaScript workspaces
        run: npm run build
